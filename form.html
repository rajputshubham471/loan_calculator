<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loan Review</title>

<style>

body{
font-family: 'Inter', sans-serif;
background: linear-gradient(135deg,#eef2ff,#f8fafc);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.card{

background:white;
width:420px;
padding:35px;
border-radius:18px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);

}

h2{
margin-top:0;
font-size:24px;
}

p{
color:#64748b;
margin-bottom:20px;
}

input,select{

width:100%;
padding:14px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #e2e8f0;
font-size:14px;
transition:0.2s;

}

input:focus{

outline:none;
border-color:#2563eb;
box-shadow:0 0 0 3px rgba(37,99,235,0.1);

}

button{

width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.2s;

}

button:hover{

background:#1d4ed8;
transform:translateY(-1px);

}

.badge{

background:#ecfdf5;
color:#16a34a;
padding:6px 10px;
border-radius:6px;
font-size:12px;
display:inline-block;
margin-bottom:10px;

}

</style>

</head>

<body>

<div class="card">

<div class="badge">Free Loan Review</div>

<h2>Check If You Can Save on Your Loan</h2>

<p>Enter your details to get a personalised savings report.</p>

<form action="https://formspree.io/f/xjgarljl" method="POST">

<input name="name" placeholder="Your Name" required>

<input name="phone" placeholder="Phone Number" required>

<input name="loan_amount" placeholder="Loan Amount (₹)">

<select name="nbfc">

<option value="">Current NBFC</option>
<option>Bajaj Finance</option>
<option>Tata Capital</option>
<option>L&T Finance</option>
<option>Aditya Birla Finance</option>

</select>

<input name="rate" placeholder="Interest Rate (%)">

<button type="submit">Get My Savings Report</button>

</form>

</div>

</body>
</html>
